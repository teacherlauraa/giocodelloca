<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il Percorso delle Alleanze</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --fluo-green: #39FF14; --super-purple: #9D00FF; --hero-red: #FF0000;
            --hero-yellow: #FFEF00; --turbo-cyan: #00FFFF; --bonus-blue: #2196F3;
            --stop-orange: #FF4500;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Roboto', sans-serif; background: #0a0a12; color: white;
            margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }
        h1 { 
            font-family: 'Luckiest Guy', cursive; color: var(--hero-yellow); 
            text-shadow: 3px 3px 0px var(--hero-red); font-size: 2.2rem; margin: 5px 0; text-align: center;
        }
        .main-container { 
            display: flex; flex-grow: 1; width: 100vw; padding: 0 20px; gap: 15px; 
            align-items: center; height: 80vh;
        }
        #sidebar { 
            width: 250px; display: flex; flex-direction: column; align-items: center; 
            flex-shrink: 0; height: 100%; justify-content: flex-start;
        }
        .legend {
            background: rgba(255, 255, 255, 0.12); border: 2px solid #555; border-radius: 12px;
            padding: 10px; width: 100%; font-size: 0.8rem; margin-bottom: 10px;
        }
        .legend-item { display: flex; align-items: center; margin-bottom: 5px; gap: 8px; line-height: 1.2; }
        .legend-sym { font-size: 1.2rem; width: 25px; text-align: center; }
        #cap-img { 
            width: auto; max-width: 100%; height: 140px; object-fit: contain;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.2)); margin-bottom: 5px;
        }
        .cap-bubble {
            background: white; color: black; padding: 15px; border-radius: 15px;
            font-weight: bold; font-size: 0.95rem; border: 3px solid var(--hero-red);
            box-shadow: 4px 4px 0px var(--super-purple); text-align: center;
            width: 100%; flex-grow: 1; min-height: 80px; max-height: 150px;
            display: flex; align-items: center; justify-content: center; margin-top: 5px;
        }
        #game-area { 
            flex-grow: 1; position: relative; background: rgba(255, 255, 255, 0.05); 
            border-radius: 25px; border: 2px solid #333; height: 100%; 
        }
        .cell {
            position: absolute; width: 62px; height: 62px; display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.65rem; color: black; border-radius: 10px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3); text-align: center; padding: 4px;
            line-height: 1.1; text-transform: uppercase;
        }
        .c-0 { background: var(--fluo-green); } .c-1 { background: var(--super-purple); color: white; }
        .c-2 { background: var(--hero-red); color: white; } .c-3 { background: var(--hero-yellow); }
        .cell-turbo, .cell-bonus, .cell-amnesia, .cell-stop { font-size: 1.8rem !important; flex-direction: column; }
        .cell-turbo { background: white !important; border: 3px solid var(--turbo-cyan); color: var(--super-purple) !important; }
        .cell-bonus { background: var(--bonus-blue) !important; border: 3px solid white; color: white !important; }
        .cell-amnesia { background: #222 !important; border: 3px solid #000; color: white !important; }
        .cell-stop { background: var(--stop-orange) !important; border: 3px solid white; color: white !important; font-size: 1.4rem !important; }
        
        /* Piccola scritta stop */
        .stop-text { font-size: 0.55rem; font-weight: 900; margin-top: -2px; }

        .cell-cup { 
            font-size: 2.8rem !important; 
            background: var(--hero-yellow) !important; 
            border: 3px solid gold;
        }
        
        #setup-screen, #name-screen, #bonus-screen, #word-modal {
            position: fixed; inset: 0; background: rgba(5, 5, 15, 0.98);
            z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .modal-content {
            background: #1e1e2f; padding: 25px; border: 5px solid var(--hero-yellow);
            border-radius: 20px; text-align: center; max-width: 600px; width: 90%;
            max-height: 95vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .modal-word { font-family: 'Luckiest Guy', cursive; font-size: 3rem; color: var(--hero-yellow); margin: 10px 0; text-transform: uppercase; }
        
        #final-team-img {
            width: auto; height: auto; max-width: 100%; max-height: 45vh;
            border-radius: 12px; border: 3px solid var(--hero-yellow);
            margin: 0 auto 15px auto; display: none; object-fit: contain;
        }

        .btn-action {
            font-family: 'Luckiest Guy', cursive; font-size: 1.4rem; padding: 12px 25px;
            cursor: pointer; background: var(--super-purple); color: white; border: none; border-radius: 12px;
            box-shadow: 0 5px 0 #4b0082; margin: 10px auto; transition: 0.2s;
        }
        .btn-action:active { transform: translateY(4px); box-shadow: none; }

        .player-token {
            width: 42px; height: 42px; position: absolute; z-index: 100;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); font-size: 2.4rem;
            display: flex; align-items: center; justify-content: center; filter: drop-shadow(0 0 5px black);
            pointer-events: none;
        }

        .ui-panel { height: 120px; background: #111; display: flex; align-items: center; justify-content: space-around; border-top: 5px solid var(--hero-yellow); width: 100%; }
        #dice-visual { width: 75px; height: 75px; background: white; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 3rem; color: black; border: 4px solid var(--super-purple); }
        #turn-info { font-family: 'Luckiest Guy', cursive; font-size: 1.6rem; color: #ccc; }
        .timer-bar-container { width: 100%; height: 15px; background: #333; border-radius: 10px; margin: 10px 0; overflow: hidden; border: 2px solid #555; }
        #timer-bar { width: 100%; height: 100%; background: var(--fluo-green); transition: width 1s linear; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="setup-box">
            <h1>IL PERCORSO DELLE ALLEANZE</h1>
            <button class="btn-action" onclick="showNameSetup(3)">3 GIOCATORI</button>
            <button class="btn-action" onclick="showNameSetup(4)">4 GIOCATORI</button>
            <button class="btn-action" onclick="showNameSetup(5)">5 GIOCATORI</button>
        </div>
    </div>

    <div id="name-screen" style="display:none;">
        <div class="setup-box">
            <h1>NOMINA I TUOI EROI</h1>
            <div id="inputs-container"></div>
            <div style="margin-top: 15px;">
                <button class="btn-action" onclick="goBackToSetup()" style="background:#555; box-shadow: 0 5px 0 #222;">INDIETRO</button>
                <button class="btn-action" onclick="initGame()">INIZIA MISSIONE</button>
            </div>
        </div>
    </div>

    <div id="word-modal" style="display:none;">
        <div class="modal-content">
            <img id="final-team-img" src="a.png" alt="Team Alleanze">
            <h2 id="display-word" class="modal-word">TITOLO</h2>
            <p id="display-desc" style="font-size: 1.2rem; color:#fff; font-weight: bold; line-height: 1.4; margin-bottom: 15px;">Suggerimento...</p>
            <div id="timer-section" style="width: 100%;">
                <div class="timer-bar-container"><div id="timer-bar"></div></div>
                <div class="timer-text-wrap" style="display: flex; align-items: center; justify-content: center; gap: 30px;">
                    <div id="timer-text" style="font-family:'Luckiest Guy', cursive; font-size: 2.5rem; color:var(--fluo-green);">60s</div>
                </div>
            </div>
            <button id="close-modal-btn" class="btn-action" style="display:none;" onclick="closeWordModal()">CONFERMA</button>
        </div>
    </div>

    <div id="bonus-screen" style="display:none;">
        <div class="setup-box">
            <h1 style="font-family: 'Luckiest Guy'; color: var(--hero-yellow);">🤝 BONUS TEAM</h1>
            <div id="bonus-options" style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;"></div>
        </div>
    </div>

    <h1>IL PERCORSO DELLE ALLEANZE</h1>

    <div class="main-container">
        <div id="sidebar">
            <div class="legend">
                <div class="legend-item"><span class="legend-sym">⚡</span> <span><b>TURBO:</b> +2 PASSI</span></div>
                <div class="legend-item"><span class="legend-sym">🛑</span> <span><b>STOP:</b> SALTA TURNO</span></div>
                <div class="legend-item"><span class="legend-sym">🌀</span> <span><b>AMNESIA:</b> -2 PASSI</span></div>
                <div class="legend-item"><span class="legend-sym">🤝</span> <span><b>TEAM:</b> SALVA CHI È INDIETRO</span></div>
            </div>
            <img id="cap-img" src="capitan.png" alt="Capitan America">
            <div id="cap-msg" class="cap-bubble">"Lancia il dado, soldato!"</div>
        </div>
        <div id="game-area"></div>
    </div>

    <div class="ui-panel">
        <div id="turn-info">In attesa...</div>
        <div id="dice-visual">?</div>
        <button id="roll-btn" class="btn-action" onclick="playTurn()">LANCIA IL DADO</button>
    </div>

    <script>
        const nomiCaselle = ["Tradimento", "Il ricordo più antico", "Avventura", "Sconfitta", "Like", "Grido di battaglia", "Kryptonite", "Identità segreta", "Qualità", "Buco nero", "Emozione", "Sistema in crash", "Cicatrice di battaglia", "Stanza", "Paura", "Sogno", "Comfort", "Nome", "Maestro di vita", "Superpower", "Sollievo", "Oblio", "Sfida", "Scudo difensivo", "Valore", "Patto degli eroi", "Origine", "Like", "Labirinto", "Silenzio", "No", "Squadra", "Dolore", "Coraggio", "Pazienza", "Rispetto", "Lealtà", "Speranza", "Amicizia", "Forza", "Invidia", "Perdono", "Fiducia", "Rabbia", "Gelosia", "Libertà", "Sincerità", "Orgoglio", "Umiltà", "END"];
        
        const suggerimenti = {
            "Tradimento": "Hai mai vissuto un momento in cui un amico non ha mantenuto una promessa?",
            "Il ricordo più antico": "Qual è la prima immagine che ti viene in mente se pensi a quando eri piccolo?",
            "Avventura": "Qual è stata la sfida più emozionante o il viaggio più strano?",
            "Sconfitta": "Racconta di quella volta che non ce l'hai fatta. Cosa hai imparato?",
            "Like": "Quanto è importante per te l'approvazione degli altri?",
            "Grido di battaglia": "Qual è la frase o la canzone che ti dà la carica?",
            "Kryptonite": "Qual è il tuo punto debole?",
            "Identità segreta": "C'è qualcosa di te che non mostri quasi a nessuno?",
            "Qualità": "Qual è il pregio che i tuoi amici ti riconoscono di più?",
            "Buco nero": "Racconta di un momento in cui ti sei sentito perso o triste.",
            "Emozione": "Qual è l'emozione che provi più spesso?",
            "Sistema in crash": "Quella volta che hai perso il controllo per la rabbia.",
            "Cicatrice di battaglia": "Un segno che ti ricorda una difficoltà superata.",
            "Stanza": "Descrivi il tuo rifugio. Cosa c'è nella tua camera che parla di te?",
            "Paura": "Qual è la cosa che ti spaventa di più?",
            "Sogno": "Qual è il tuo sogno più grande?",
            "Comfort": "Qual è quel posto che ti fa sentire subito al sicuro?",
            "Nome": "Se potessi scegliere un nome, quale sarebbe?",
            "Maestro di vita": "C'è una persona a cui ti ispiri?",
            "Superpower": "Se potessi avere un solo potere magico per un giorno, quale sceglieresti?",
            "Sollievo": "L'ultima volta che hai fatto un respiro profondo e hai pensato: 'Meno male!'",
            "Oblio": "C'è qualcosa del tuo passato che vorresti cancellare?",
            "Sfida": "Qual è l'ostacolo più grande che hai affrontato?",
            "Scudo difensivo": "Cosa fai per proteggerti quando qualcuno ti critica?",
            "Valore": "Qual è la cosa più importante per te?",
            "Patto degli eroi": "Hai mai fatto una promessa solenne a qualcuno? Quale?",
            "Origine": "Da dove viene la tua forza?",
            "Labirinto": "Racconta di una situazione complicata da cui non sapevi come uscire.",
            "Silenzio": "Ti piace stare da solo con i tuoi pensieri? Motiva.",
            "No": "Quella volta che hai dovuto dire di NO anche se era difficile.",
            "Squadra": "Chi sono le persone su cui puoi contare?",
            "Dolore": "Qual è stata la perdita che ti ha fatto soffrire di più?",
            "Coraggio": "Racconta un momento in cui hai fatto qualcosa nonostante avessi paura.",
            "Pazienza": "Sei una persona che sa aspettare o vuoi tutto e subito? Motiva.",
            "Rispetto": "Cosa significa per te rispettare qualcuno?",
            "Lealtà": "Saresti disposto a coprire un errore di un amico per lealtà?",
            "Speranza": "In cosa speri per il mondo di domani?",
            "Amicizia": "Cosa rende una persona un 'vero' amico?",
            "Forza": "La vera forza sta nei muscoli o nella testa? Motiva la risposta.",
            "Invidia": "Ti è mai capitato di desiderare qualcosa che apparteneva a un altro?",
            "Perdono": "È più difficile perdonare gli altri o se stessi?",
            "Fiducia": "Quanto tempo ci metti a fidarti di una persona nuova?",
            "Rabbia": "Cosa ti fa arrabbiare così tanto da farti 'diventare verde'?",
            "Gelosia": "Sei geloso dei tuoi amici o delle tue cose?",
            "Libertà": "Cosa significa per te essere libero?",
            "Sincerità": "Una bugia a fin di bene è comunque una bugia?",
            "Orgoglio": "C'è qualcosa che hai fatto di cui vai fiero?",
            "Umiltà": "Ammettere di aver sbagliato è un segno di debolezza o forza?",
            "END": "Missione Compiuta! L'alleanza più forte non è quella che non cade mai, ma quella che si rialza insieme. Qual è la cosa più preziosa che porti via da questo percorso?"
        };

        const allianceCells = [0, 4, 16, 22, 30]; 
        const turboCells = [2, 10, 20, 32, 40];     
        const stopCells = [12, 24, 34, 42];        
        const amnesiaCells = [8, 18, 28, 36];      

        let players = [];
        let currentPlayerIndex = 0;
        const totalCells = 50;
        let timerInterval;

        function showNameSetup(num) {
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('name-screen').style.display = 'flex';
            const container = document.getElementById('inputs-container');
            container.innerHTML = "";
            for(let i=0; i<num; i++) {
                container.innerHTML += `<div style="display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:5px;"><div style="font-size:2rem; background:rgba(255,255,255,0.1); border-radius:10px; width:40px; height:40px; display:flex; align-items:center; justify-content:center; border:2px solid var(--super-purple);">${['🦸‍♀️', '🦸‍♂️', '🤖', '🦇', '🕷️'][i]}</div><input type="text" id="name-${i}" placeholder="Eroe ${i+1}" style="padding:8px; width:65%; border-radius:10px; font-size:1rem; border:none; font-family:'Roboto', sans-serif; font-weight:bold;"></div>`;
            }
        }
        function goBackToSetup() { document.getElementById('name-screen').style.display = 'none'; document.getElementById('setup-screen').style.display = 'flex'; players = []; }
        
        function initGame() {
            const inputs = document.querySelectorAll('#inputs-container input');
            players = [];
            inputs.forEach((input, i) => { 
                players.push({ id: i, name: (input.value.trim() || `Eroe ${i+1}`).toUpperCase(), pos: 0, icon: ['🦸‍♀️', '🦸‍♂️', '🤖', '🦇', '🕷️'][i], frozen: false, justAmnesied: false }); 
            });
            document.getElementById('name-screen').style.display = 'none';
            drawPath();
        }

        function drawPath() {
            const area = document.getElementById('game-area'); area.innerHTML = "";
            const areaRect = area.getBoundingClientRect();
            const cols = 10; const cellW = 62;
            const paddingX = (areaRect.width - (cols * cellW)) / (cols + 1);
            const paddingY = (areaRect.height - (5 * cellW)) / 6;

            for (let i = 0; i < totalCells; i++) {
                const cell = document.createElement('div');
                cell.className = `cell c-${i % 4}`;
                if (turboCells.includes(i)) cell.classList.add('cell-turbo');
                if (allianceCells.includes(i)) cell.classList.add('cell-bonus');
                if (amnesiaCells.includes(i)) cell.classList.add('cell-amnesia');
                if (stopCells.includes(i)) cell.classList.add('cell-stop');
                if (i === totalCells - 1) cell.classList.add('cell-cup');

                cell.id = `cell-${i}`;
                let r = Math.floor(i / cols); let c = i % cols;
                if (r % 2 !== 0) c = (cols - 1) - c;
                cell.style.left = `${paddingX + c * (cellW + paddingX)}px`;
                cell.style.top = `${paddingY + r * (cellW + paddingY)}px`;
                
                if (i === totalCells - 1) cell.innerHTML = "🏆";
                else if (turboCells.includes(i)) cell.innerHTML = "⚡";
                else if (stopCells.includes(i)) cell.innerHTML = `<span>🛑</span><span class="stop-text">STOP</span>`;
                else if (amnesiaCells.includes(i)) cell.innerHTML = "🌀";
                else if (allianceCells.includes(i)) cell.innerHTML = "🤝";
                else cell.innerText = nomiCaselle[i];
                area.appendChild(cell);
            }

            players.forEach((p, i) => {
                const token = document.createElement('div'); 
                token.id = `player-${i}`;
                token.className = 'player-token'; 
                token.innerHTML = p.icon; 
                area.appendChild(token);
            });
            updatePositions();
            updateTurnInfo();
        }

        function updatePositions() {
            players.forEach((p, i) => {
                const cell = document.getElementById(`cell-${p.pos}`);
                const token = document.getElementById(`player-${i}`);
                if (cell && token) { 
                    token.style.left = (parseInt(cell.style.left) + 10 + (i*4)) + 'px'; 
                    token.style.top = (parseInt(cell.style.top) + 8) + 'px'; 
                }
                if (token) token.style.opacity = p.frozen ? "0.3" : "1";
            });
        }

        function updateTurnInfo() {
            const p = players[currentPlayerIndex];
            document.getElementById('turn-info').innerHTML = `Turno: <span style="color:var(--fluo-green)">${p.icon} ${p.name}</span>`;
        }

        function playTurn() {
            let p = players[currentPlayerIndex];
            p.justAmnesied = false;
            if(p.frozen) { 
                p.frozen = false; 
                updatePositions(); 
                document.getElementById('cap-msg').innerText = p.name + " riparte!"; 
                nextTurn(); 
                return; 
            }
            document.getElementById('roll-btn').disabled = true;
            let count = 0; const diceIcons = ["⚀", "⚁", "⚂", "⚃"];
            const anim = setInterval(() => {
                document.getElementById('dice-visual').innerText = diceIcons[Math.floor(Math.random() * 4)];
                if (++count > 12) { 
                    clearInterval(anim); 
                    const roll = Math.floor(Math.random() * 4) + 1; 
                    document.getElementById('dice-visual').innerText = diceIcons[roll-1]; 
                    movePlayer(roll); 
                }
            }, 80);
        }

        async function movePlayer(steps) {
            let p = players[currentPlayerIndex];
            for (let i = 0; i < steps; i++) { 
                if (p.pos >= totalCells - 1) break; 
                p.pos++; 
                updatePositions(); 
                await new Promise(r => setTimeout(r, 400)); 
            }
            checkLanding(p);
        }

        function checkLanding(p) {
            if (amnesiaCells.includes(p.pos) && !p.justAmnesied) {
                openWordModal("🌀 AMNESIA", "Torni indietro di 2 passi!");
            } 
            else if (turboCells.includes(p.pos)) handleTurbo(p);
            else if (stopCells.includes(p.pos)) { 
                p.frozen = true; 
                updatePositions(); 
                document.getElementById('cap-msg').innerText = "🛑 Fermo un turno!"; 
                nextTurn(); 
            }
            else if (allianceCells.includes(p.pos)) handleAllianceBonus(p);
            else openWordModal(nomiCaselle[p.pos]);
        }

        async function handleTurbo(p) {
            document.getElementById('cap-msg').innerText = "⚡ TURBO! +2 passi!";
            await new Promise(r => setTimeout(r, 800));
            for (let i = 0; i < 2; i++) { 
                if (p.pos >= totalCells - 1) break; 
                p.pos++; 
                updatePositions(); 
                await new Promise(r => setTimeout(r, 400)); 
            }
            checkLanding(p);
        }
        
        function openWordModal(title, desc = "") {
            const teamImg = document.getElementById('final-team-img');
            const timerSect = document.getElementById('timer-section');
            const closeBtn = document.getElementById('close-modal-btn');
            
            if (title === "END") {
                teamImg.style.display = "block";
                timerSect.style.display = "none";
                closeBtn.style.display = "block";
            } else {
                teamImg.style.display = "none";
                const isAmnesia = title.includes("AMNESIA");
                timerSect.style.display = isAmnesia ? 'none' : 'block';
                closeBtn.style.display = isAmnesia ? 'block' : 'none';
                if (!isAmnesia) startTimer();
            }
            
            document.getElementById('display-word').innerText = title.toUpperCase();
            let text = desc || (suggerimenti[title] ? suggerimenti[title] : "Condividi il tuo pensiero.");
            document.getElementById('display-desc').innerText = text;
            document.getElementById('word-modal').style.display = 'flex';
        }

        function startTimer() {
            let timeLeft = 60; const bar = document.getElementById('timer-bar'); const txt = document.getElementById('timer-text');
            bar.style.width = '100%'; if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => { 
                timeLeft--; 
                txt.innerText = timeLeft + "s"; 
                bar.style.width = (timeLeft / 60 * 100) + "%"; 
                if (timeLeft <= 0) { 
                    clearInterval(timerInterval); 
                    document.getElementById('close-modal-btn').style.display = 'block'; 
                } 
            }, 1000);
        }
        
        async function closeWordModal() {
            clearInterval(timerInterval); 
            let p = players[currentPlayerIndex];
            document.getElementById('word-modal').style.display = 'none';
            if (amnesiaCells.includes(p.pos)) {
                p.justAmnesied = true;
                for (let i = 0; i < 2; i++) { if (p.pos <= 0) break; p.pos--; updatePositions(); await new Promise(r => setTimeout(r, 400)); }
                checkLanding(p); 
                return;
            }
            if (p.pos === totalCells - 1) { 
                alert("CONGRATULAZIONI!"); 
                location.reload(); 
            } else nextTurn();
        }

        function nextTurn() { 
            currentPlayerIndex = (currentPlayerIndex + 1) % players.length; 
            updateTurnInfo(); 
            document.getElementById('roll-btn').disabled = false; 
        }
        
        function handleAllianceBonus(currentPlayer) {
            const backwardOnes = players.filter(p => p.id !== currentPlayer.id && p.pos < currentPlayer.pos);
            if (backwardOnes.length === 0) { 
                document.getElementById('cap-msg').innerText = "🤝 Nessun alleato!"; 
                setTimeout(nextTurn, 1500); 
                return; 
            }
            document.getElementById('cap-msg').innerText = "🤝 BONUS TEAM!";
            const screen = document.getElementById('bonus-screen');
            const container = document.getElementById('bonus-options');
            container.innerHTML = ""; screen.style.display = "flex";
            backwardOnes.forEach(p => {
                const btn = document.createElement('button'); btn.className = "btn-action"; btn.innerText = `${p.icon} ${p.name}`;
                btn.onclick = () => { 
                    p.pos = currentPlayer.pos; p.frozen = false; updatePositions(); 
                    screen.style.display = "none"; 
                    nextTurn(); 
                };
                container.appendChild(btn);
            });
        }
    </script>
</body>
</html>
